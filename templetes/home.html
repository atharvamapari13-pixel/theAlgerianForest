<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FWI Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }
        .container {
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #333;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #555;
        }
        .result {
            margin-top: 20px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>FWI Prediction</h1>

    <form action="{{ url_for(predict_datapoint)}}" method="POST">
        <input type="text" name="temperature" placeholder="Temperature" required>
        <input type="text" name="rh" placeholder="RH" required>
        <input type="text" name="ws" placeholder="Ws" required>
        <input type="text" name="rain" placeholder="Rain" required>
        <input type="text" name="ffmc" placeholder="FFMC" required>
        <input type="text" name="dmc" placeholder="DMC" required>
        <input type="text" name="isi" placeholder="ISI" required>
        <input type="text" name="Class" placeholder="Class" required>
        <input type="text" name="region" placeholder="region" required>

        <button type="submit">Predict</button>
    </form>

    <div class="result">
        THE FWI prediction is: {{ prediction }}
    </div>
</div>

</body>
</html>
